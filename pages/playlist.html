<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOOD WAVE - PLAYLIST</title>
    <link rel="stylesheet" href="/assets/css/pages/playlist.css" />
    <link rel="stylesheet" href="/assets/css/setting/fonts.css" />
    <link rel="stylesheet" href="/assets/css/setting/vars.css" />
    <link rel="stylesheet" href="/assets/css/setting/reset.css" />
    <link rel="stylesheet" href="/assets/css/setting/common.css" />

    <link rel="stylesheet" href="/assets/css/layout.css" />

    <link rel="stylesheet" href="/assets/css/components/sidebar.css" />
    <link rel="stylesheet" href="/assets/css/components/header.css" />
    <link rel="stylesheet" href="/assets/css/components/footer.css" />
  </head>
  <body>
    <div class="container">
      <aside id="sidebar" class="sidebar"></aside>
      <header id="header" class="header"></header>
      <!-- <div class="playlist-overlay"></div> -->
      <main class="main playlist-main">
        <!-- 플레이리스트 히어로 섹션 -->
        <div class="playlist-hero-container">
          <div src="" alt="" class="playlist-cover"></div>
          <div class="playlist-info">
            <p class="section-label">PUBLIC PLAYLIST</p>
            <h1 class="playlist-title">Overcast Vibes</h1>
            <p class="playlist-desc">Rainy nights, blurred city lights, and slow indie tracks</p>
            <p class="playlist-meta">Generated from today's weather</p>
          </div>
        </div>

        <div class="playlist-content-container">
          <div class="playlist-actions">
            <div class="playlist-actions-btn">
              <a href="" class="play-btn"><img src="/assets/icon/Play_Greem Hover.svg" alt="" /></a>
              <a href="" class="liked-btn"><img src="/assets/icon/Heart_XS.svg" alt="" /></a>
              <a href="" class="download-btn"><img src="/assets/icon/Download_XS.svg" alt="" /></a>
            </div>
            <a class="playlist-sort">
              Custom order
              <img src="/assets/icon/sort-btn.svg" alt="" class="sort-icon" />
            </a>
          </div>
          <!-- 플레이리스트 목록 -->
          <section class="playlist-section">
            <div class="playlist-header">
              <span>#</span>
              <span>Title</span>
              <span></span>
              <img src="/assets/icon/Clock_XS.svg" />
            </div>
            <div class="playlist-list"></div>
          </section>
        </div>
      </main>
      <footer id="footer" class="player"></footer>
    </div>

    <script type="module" src="/assets/js/pages/playlist.js"></script>
  </body>
</html>
